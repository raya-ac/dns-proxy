version: '3.8'

services:
  dns-proxy:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: dns-proxy
    restart: unless-stopped
    ports:
      # DNS server (UDP and TCP)
      - "53:53/udp"
      - "53:53/tcp"
      # HTTP proxy
      - "6000:6000"
      # HTTPS proxy
      - "443:443"
      # Dashboard
      - "3000:3000"
    volumes:
      # Configuration
      - ./config.json:/app/config.json:ro
      # Certificates (persistent)
      - ./certs:/app/certs
      # Logs (persistent)
      - ./logs:/app/logs
      # CA generation script
      - ./scripts:/app/scripts:ro
    environment:
      - NODE_ENV=production
      - TZ=Australia/Sydney
    cap_add:
      # Required for binding to privileged ports (< 1024)
      - NET_BIND_SERVICE
    networks:
      - proxy-network
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/api/health', r => process.exit(r.statusCode === 200 ? 0 : 1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

networks:
  proxy-network:
    driver: bridge
